<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe - Detflix</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="main-content">
        <div style="text-align:center; margin-bottom:40px; max-width:600px; margin-left:auto; margin-right:auto;">
            <h1 class="page-title" style="text-align:center;">Get Full Access</h1>
            <p style="color:var(--text-muted);">Watch the full catalog in HD. No commitments — cancel anytime.</p>
        </div>

        <div style="max-width:380px; margin:0 auto;">
            <div class="plan-card popular" style="text-align:center;">
                <span class="plan-badge">Full Access</span>
                <p class="plan-name">Detflix</p>
                <p class="plan-price">$9.99<span>/month</span></p>
                <ul class="plan-features" style="text-align:left;">
                    <li>Full HD Quality</li>
                    <li>Unlimited movies</li>
                    <li>Ad-free experience</li>
                    <li>Personal watchlist</li>
                    <li>Cancel anytime</li>
                </ul>
                <div id="plan-action"></div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        (async () => {
            const user = await getCurrentUser();
            await renderNavbar(user);

            const el = document.getElementById('plan-action');
            if (!user) {
                el.innerHTML = `<a href="/register.html" class="plan-btn">Get Started</a>`;
            } else if (user.subscription?.active) {
                el.innerHTML = `<button class="plan-btn" disabled>✓ Already Subscribed</button>`;
            } else {
                el.innerHTML = `<button class="plan-btn" onclick="window.location.href='/payment.html'">Subscribe Now</button>`;
            }
        })();
    </script>
</body>
</html>
