<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Detflix</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>
    <div class="auth-page">
        <div class="auth-box">
            <a href="/" class="auth-logo">Detflix</a>
            <h1>Sign In</h1>
            <p class="subtitle">Welcome back</p>

            <div id="alert" class="alert alert-error" style="display:none;"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@email.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="form-submit" id="submit-btn">Sign In</button>
            </form>

            <div class="auth-switch">
                Don't have an account? <a href="/register.html">Sign up here</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        (async () => {
            const user = await getCurrentUser();
            await renderNavbar(user);
            if (user) window.location.href = '/';
        })();

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertEl = document.getElementById('alert');
            const btn = document.getElementById('submit-btn');

            alertEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();

                if (!res.ok) {
                    alertEl.textContent = data.error || 'Sign in failed';
                    alertEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                    return;
                }

                setAuth(data.token, data.user);
                window.location.href = '/';
            } catch {
                alertEl.textContent = 'Connection error. Make sure the server is running.';
                alertEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
