<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detflix - Movies</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="main-content">
        <h2 class="page-title" id="section-title">Popular Movies</h2>

        <div class="filter-bar">
            <select id="filter-genre">
                <option value="">All Genres</option>
            </select>
            <select id="filter-sort">
                <option value="">Most Popular</option>
                <option value="title.asc">A → Z</option>
                <option value="title.desc">Z → A</option>
                <option value="vote_average.desc">Top Rated</option>
                <option value="release_date.desc">Newest First</option>
                <option value="release_date.asc">Oldest First</option>
            </select>
            <select id="filter-duration">
                <option value="">Any Duration</option>
                <option value="short">Short (&lt; 90 min)</option>
                <option value="medium">Medium (90–120 min)</option>
                <option value="long">Long (&gt; 120 min)</option>
            </select>
            <button id="filter-reset">Reset</button>
        </div>

        <div id="movies-container">
            <div class="loading" style="grid-column:1/-1;">
                <div class="spinner"></div>
                <p>Loading movies...</p>
            </div>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/catalog.js"></script>
    <script src="js/api.js"></script>
</body>
</html>
